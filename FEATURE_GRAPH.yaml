features:
  - id: F000
    name: MetaProject scaffold
    status: completed
    phase: P00
    user_value: "Creates durable project memory and a repeatable agent workflow."
    dependencies: []
    acceptance:
      - "Core MetaProject documents exist."
      - "Agent role prompts exist."
      - "Job templates exist."
      - "Validation script passes or known validation gaps are documented."

  - id: F001
    name: Spatial viewport scope cleanup
    status: current
    phase: P01
    user_value: "Prevents PM and worker agents from following stale rokid-termux assumptions."
    dependencies:
      - F000
    acceptance:
      - "README and root/meta docs describe Rokid Spatious Viewport as the core product."
      - "Termux is described only as a future/flagship mirrored-app use case."
      - "PM orchestration docs include the new implementation order."

  - id: F002
    name: Kotlin Android project skeleton
    status: planned
    phase: P01
    user_value: "Creates the minimal Android foundation needed for capture and viewport work."
    dependencies:
      - F001
    acceptance:
      - "Minimal Android Gradle project exists."
      - "Android implementation is Kotlin-first, not Java-first."
      - "Simple app entry/debug screen exists."
      - "Build command is documented."
      - "MediaProjection is not implemented in this skeleton-only feature."

  - id: F003
    name: Pure spatial viewport geometry core
    status: planned
    phase: P01
    user_value: "Creates the reusable math contract for phone simulator, capture integration, and Rokid renderer."
    dependencies:
      - F002
    acceptance:
      - "Pure Kotlin geometry module exists without Android UI dependency."
      - "Padded canvas calculation exists."
      - "Reticle-to-viewport mapping exists."
      - "Tests cover center and all four content corners."
      - "Reticle can point at true content corners using half-viewport padding."

  - id: F004
    name: MediaProjection capture proof
    status: planned
    phase: P01
    user_value: "Proves the app can capture a user-approved app/display surface for viewport rendering."
    dependencies:
      - F002
      - F003
    acceptance:
      - "Capture starts through Android system consent."
      - "Virtual display/capture surface is created."
      - "Captured frames appear in a debug view."
      - "Capture can stop and release resources."
      - "Resize/rotation is handled or limitation is documented."
      - "Protected content boundaries are respected."

  - id: F005
    name: Phone-side viewport simulator
    status: candidate
    phase: P02
    user_value: "Lets the team prove spatial viewport UX before depending on Rokid SDK details."
    dependencies:
      - F003
      - F004
    acceptance:
      - "Synthetic or captured frame is placed on padded virtual canvas."
      - "Fixed center reticle is shown."
      - "Viewport can pan over the canvas."
      - "Recenter/freeze/debug information exists."

  - id: F006
    name: Overscan cache prototype
    status: candidate
    phase: P02
    user_value: "Proves Strategy C locally before device transport."
    dependencies:
      - F005
    acceptance:
      - "Overscan region larger than viewport is computed."
      - "Visible viewport can be cropped from cached region."
      - "Cache edge/miss behavior is visible in debug UI."

  - id: F007
    name: Rokid renderer skeleton
    status: candidate
    phase: P03
    user_value: "Displays the spatial viewport on Rokid glasses using the shared geometry model."
    dependencies:
      - F005
      - F006
    acceptance:
      - "Rokid-side app/client can display viewport from cached region."
      - "Head-pose provider abstraction exists."
      - "Fake pose provider works if Rokid SDK is unavailable."
      - "Same geometry model is used as phone simulator."

  - id: F008
    name: Future input providers
    status: future
    phase: P04
    user_value: "Adds convenient interaction once viewport and capture are proven."
    dependencies:
      - F007
    acceptance:
      - "Bluetooth ring provider can map confirm/cancel/scroll/recenter."
      - "ASR provider can map command phrases."
      - "Accessibility-gated app-control remains opt-in."
