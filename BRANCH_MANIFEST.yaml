workflow: goal_graph_phase_branch_verify
last_updated: 2026-06-29

branch_policy:
  main:
    purpose: "Verified project state."
    direct_push: false_after_initial_scaffold
  phase:
    pattern: "phase/Pxx-short-name"
    purpose: "Integration branch for one phase."
  job:
    pattern: "job/Pxx-Jxxx-short-name"
    purpose: "One scoped job performed by one sub-agent."

